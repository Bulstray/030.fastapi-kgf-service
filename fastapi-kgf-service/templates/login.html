{% extends 'base.html' %}

{% block main %}
  <div class="bg-dark min-vh-100 d-flex align-items-center justify-content-center">
    <div class="col-md-6 col-lg-4">
      <!-- Заголовок -->
      <div class="text-center mb-4">
        <h1 class="text-white fw-bold mt-2">KGF Service</h1>
        <p class="text-white-50">Сервис для сотрудников</p>
      </div>

      <!-- Alert -->
      <div class="alert alert-info d-flex align-items-center" role="alert">
        <i class="bi bi-info-circle-fill me-2"></i>
        <div>Войдите в систему, чтобы получить доступ к сайту</div>
      </div>

      <!-- Форма -->
      <form class="bg-dark text-white p-4 rounded border border-secondary">
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent text-white-50 border-secondary">
              <i class="bi bi-envelope"></i>
            </span>
            <input type="email"
                   class="form-control bg-transparent text-white border-secondary"
                   id="exampleInputEmail1"
                   placeholder="name@example.com"
                   required>
          </div>
        </div>

        <div class="mb-3">
          <label for="exampleInputPassword1"
                 class="form-label"
          >Пароль</label>

          <div class="input-group">
            <span class="input-group-text bg-transparent text-white-50 border-secondary">
              <i class="bi bi-lock"></i>
            </span>
            <input type="password"
                   class="form-control bg-transparent text-white border-secondary"
                   id="exampleInputPassword1"
                   placeholder="••••••••"
                   required>
          </div>
          <div class="form-text text-white-50 mt-1">
            <i class="bi bi-shield-check me-1"></i>Пароли хранятся в захешированном виде
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <a href="#" class="text-decoration-none text-info small">Забыли пароль?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">
          <i class="bi bi-box-arrow-in-right me-2"></i>Войти
        </button>

        <!-- Разделитель -->
        <div class="d-flex align-items-center mb-3">
          <hr class="flex-grow-1 border-secondary">
          <hr class="flex-grow-1 border-secondary">
        </div>

        <div class="text-center mt-1">
          <small class="text-white-50">&copy; 2026 KGF Service. Все права защищены.</small>
        </div>

      </form>
    </div>
  </div>
{% endblock %}
